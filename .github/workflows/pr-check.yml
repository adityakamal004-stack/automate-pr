name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Get PR Diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: Send Diff to Groq
        run: |
          DIFF_CONTENT=$(cat pr.diff | head -n 1000)

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF_CONTENT" \
            '{
              model: "llama-3.3-70b-versatile",
              messages: [
                {
                  role: "system",
                  content: "You are a senior software engineer reviewing a pull request. Provide feedback with critical issues, warnings, and suggestions."
                },
                {
                  role: "user",
                  content: ("Review this PR diff:\n\n" + $diff)
                }
              ]
            }')

          HTTP_CODE=$(curl -s -o review.json -w "%{http_code}" \
            https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -d "$PAYLOAD")

          echo "Groq API responded with HTTP $HTTP_CODE"
          cat review.json

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Groq API returned HTTP $HTTP_CODE"
            exit 1
          fi

        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const message = review.choices?.[0]?.message?.content || "No review generated.";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **AI Review (Groq):**\n\n" + message
            });
